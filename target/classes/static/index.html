<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Weather Reporting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { background: linear-gradient(135deg,#87CEFA 0%, #E6E6FA 100%); min-height:100vh; }
      .card { backdrop-filter: blur(6px); }
      .city-select { max-width:420px; }
    </style>
  </head>
  <body>
    <div class="d-flex align-items-center justify-content-center vh-100">
      <div class="card p-4 shadow city-select">
        <h3 class="mb-3">Indian City Weather</h3>
        <div class="mb-3">
          <select id="city" class="form-select">
            <option value="Delhi">Delhi</option>
            <option value="Mumbai">Mumbai</option>
            <option value="Bengaluru">Bengaluru</option>
            <option value="Chennai">Chennai</option>
            <option value="Kolkata">Kolkata</option>
            <option value="Hyderabad">Hyderabad</option>
            <option value="Pune">Pune</option>
            <option value="Ahmedabad">Ahmedabad</option>
            <option value="Jaipur">Jaipur</option>
            <option value="Lucknow">Lucknow</option>
          </select>
        </div>
        <div class="d-flex gap-2">
          <button id="submit" class="btn btn-primary flex-grow-1">Get Temperature</button>
          <button id="detailsBtn" class="btn btn-outline-secondary">Show Details</button>
        </div>

        <div id="result" class="mt-4" style="min-height:56px;"></div>

        <div id="cityDetails" class="mt-3" style="display:none;"></div>
      </div>
    </div>

    <script>
      async function fetchTemp(city) {
        const res = await fetch(`/api/weather?city=${encodeURIComponent(city)}`);
        return res.json();
      }

      const CITY_INFO = {
        'delhi': {
          location: 'Northern India (National Capital Territory)',
          bestTime: 'October to March',
          places: ['Red Fort', 'Qutub Minar', 'India Gate', 'Humayun\'s Tomb'],
          image: 'https://source.unsplash.com/600x400/?delhi,india'
        },
        'mumbai': {
          location: 'West coast of India, Maharashtra',
          bestTime: 'November to February',
          places: ['Gateway of India', 'Marine Drive', 'Elephanta Caves'],
          image: 'https://source.unsplash.com/600x400/?mumbai,india'
        },
        'bengaluru': {
          location: 'South India, Karnataka (also Bangalore)',
          bestTime: 'October to February',
          places: ['Lalbagh Botanical Garden', 'Bangalore Palace', 'Cubbon Park'],
          image: 'https://source.unsplash.com/600x400/?bangalore,india'
        },
        'chennai': {
          location: 'East coast of India, Tamil Nadu',
          bestTime: 'November to February',
          places: ['Marina Beach', 'Fort St. George', 'Kapaleeshwarar Temple'],
          image: 'https://source.unsplash.com/600x400/?chennai,india'
        },
        'kolkata': {
          location: 'East India, West Bengal',
          bestTime: 'October to March',
          places: ['Victoria Memorial', 'Howrah Bridge', 'Dakshineswar Kali Temple'],
          image: 'https://source.unsplash.com/600x400/?kolkata,india'
        },
        'hyderabad': {
          location: 'South-central India, Telangana',
          bestTime: 'October to February',
          places: ['Charminar', 'Golconda Fort', 'Hussain Sagar Lake'],
          image: 'https://source.unsplash.com/600x400/?hyderabad,india'
        },
        'pune': {
          location: 'Western India, Maharashtra (near Mumbai)',
          bestTime: 'July to February',
          places: ['Shaniwar Wada', 'Aga Khan Palace', 'Sinhagad Fort'],
          image: 'https://source.unsplash.com/600x400/?pune,india'
        },
        'ahmedabad': {
          location: 'Western India, Gujarat',
          bestTime: 'October to March',
          places: ['Sabarmati Ashram', 'Kankaria Lake', 'Adalaj Stepwell'],
          image: 'https://source.unsplash.com/600x400/?ahmedabad,india'
        },
        'jaipur': {
          location: 'Northwest India, Rajasthan',
          bestTime: 'October to March',
          places: ['Amber Fort', 'City Palace', 'Hawa Mahal'],
          image: 'https://source.unsplash.com/600x400/?jaipur,india'
        },
        'lucknow': {
          location: 'Northern India, Uttar Pradesh',
          bestTime: 'October to March',
          places: ['Bara Imambara', 'Rumi Darwaza', 'Hazratganj'],
          image: 'https://source.unsplash.com/600x400/?lucknow,india'
        }
      };

      function renderDetails(cityKey) {
        const info = CITY_INFO[cityKey.toLowerCase()];
        const details = document.getElementById('cityDetails');
        if (!info) {
          details.style.display = 'none';
          return;
        }
        details.style.display = 'block';
        details.innerHTML = `
          <div class="card mt-2 shadow-sm">
            <div class="row g-0">
              <div class="col-md-5">
                <img src="${info.image}" class="img-fluid rounded-start" alt="${capitalize(cityKey)}">
              </div>
              <div class="col-md-7">
                <div class="card-body">
                  <h5 class="card-title mb-1">${capitalize(cityKey)}</h5>
                  <p class="text-muted mb-2"><strong>Location:</strong> ${info.location}</p>
                  <p class="mb-2"><strong>Best time to visit:</strong> <span class="badge bg-info text-dark">${info.bestTime}</span></p>
                  <p class="mb-1"><strong>Top places:</strong></p>
                  <ul class="list-unstyled ms-3">
                    ${info.places.map(p => `<li>• ${p}</li>`).join('')}
                  </ul>
                </div>
              </div>
            </div>
          </div>
        `;
      }

      document.getElementById('submit').addEventListener('click', async () => {
        const city = document.getElementById('city').value;
        const result = document.getElementById('result');
        renderDetails(city);
        result.innerHTML = '<div class="text-muted">Loading…</div>';
        try {
          const data = await fetchTemp(city);
          if (data.error) {
            result.innerHTML = `<div class="text-danger">${data.error}</div>`;
          } else {
            const mockBadge = data.mock ? '<span class="badge bg-warning text-dark ms-2">mock</span>' : '';
            result.innerHTML = `
              <div class="border rounded p-3 bg-white">
                <div class="d-flex align-items-center">
                  <h5 class="mb-1">${data.city}</h5>
                  ${mockBadge}
                </div>
                <div class="fs-3">${data.temperature} <small class="text-muted">°C</small></div>
              </div>`;
          }
        } catch (e) {
          result.innerHTML = `<div class="text-danger">Request failed: ${e.message}</div>`;
        }
      });

      document.getElementById('detailsBtn').addEventListener('click', () => {
        const city = document.getElementById('city').value;
        const details = document.getElementById('cityDetails');
        if (details.style.display === 'none' || details.innerHTML.trim() === '') {
          renderDetails(city);
        } else {
          details.style.display = 'none';
        }
      });

      function capitalize(s){ return s.charAt(0).toUpperCase() + s.slice(1); }
    </script>
  </body>
</html>
